name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build GoReleaser Docker image
        run: |
          docker build -f Dockerfile.goreleaser \
            --build-arg GO_RELEASER_CROSS_VERSION=v1.26.0 \
            -t fosilo-goreleaser-cross .

      - name: Run GoReleaser
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/go/src/github.com/siohaza/fosilo" \
            -w /go/src/github.com/siohaza/fosilo \
            -e CGO_ENABLED=1 \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            fosilo-goreleaser-cross \
            release --clean
